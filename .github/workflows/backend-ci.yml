name: backend-ci

on:
  pull_request:
    paths:
      - 'apps/backend/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    # Container efêmero só deste job — isolado de qualquer banco real,
    # existe e some junto com o run do workflow.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: shift
          POSTGRES_PASSWORD: shift_ci_password
          POSTGRES_DB: shift_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://shift:shift_ci_password@localhost:5432/shift_test
      JWT_SECRET: ci-only-secret-never-used-outside-this-workflow

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint --workspace=apps/backend
      - run: npm run db:migrate --workspace=apps/backend
      - run: npm test --workspace=apps/backend
      - run: npm run build --workspace=apps/backend
